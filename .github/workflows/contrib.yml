name: refresh contribution data

on:
  schedule:
    # every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  # Patch stat numbers in README.md (kept from original workflow)
  patch-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: fetch and patch
        uses: actions/github-script@v7
        with:
          script: |
            const query = `query($login: String!) {
              user(login: $login) {
                contributionsCollection {
                  contributionCalendar { totalContributions }
                  totalCommitContributions
                  totalPullRequestContributions
                  totalIssueContributions
                }
                pullRequests(first: 1) { totalCount }
                repositories(ownerAffiliations: OWNER) { totalCount }
              }
            }`;
            const res = await github.graphql(query, { login: 'AzureAbalone' });
            const cc = res.user.contributionsCollection;
            const fmt = (n) => String(n).toLocaleString('en-US');

            const fs = require('fs');
            const tpl = fs.readFileSync('README.md', 'utf8');
            const patches = {
              'last-year-contribs': fmt(cc.contributionCalendar.totalContributions),
              'commits-in-july-2026': fmt(cc.totalCommitContributions),
              'active-repositories': String(res.user.repositories.totalCount),
              'pull-requests-merged': fmt(res.user.pullRequests.totalCount),
            };

            let md = tpl;
            let changed = false;
            for (const [key, value] of Object.entries(patches)) {
              const re = new RegExp(`(<div class="stat-num" data-stat="${key}">)([^<]+)(</div>)`);
              const next = md.replace(re, (_m, a, _b, c) => a + value + c);
              if (next !== md) { changed = true; md = next; }
            }
            if (!changed) {
              core.notice('no stat values changed; skip commit');
              return;
            }
            fs.writeFileSync('README.md', md);

      - name: commit and push
        run: |
          git config user.name "azure-abalone-bot"
          git config user.email "azure-abalone-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && { echo "no diff"; exit 0; }
          git commit -m "ci(contrib): refresh stats via GraphQL (auto-refresh by .github/workflows/contrib.yml)"
          git push

  # Render brutalist mono SVG graph into index.html for Pages site
  render-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: render brutalist contribution graph into index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_LOGIN: AzureAbalone
        run: |
          set -x
          node .github/scripts/build-graph.mjs 2>&1 | tee build-graph.log
          echo "tee exit=${PIPESTATUS[0]}"
          cat build-graph.log

      - name: upload build-graph log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-graph-log
          path: build-graph.log
          if-no-files-found: ignore
          retention-days: 90

      - name: commit and push
        run: |
          git config user.name "azure-abalone-bot"
          git config user.email "azure-abalone-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && { echo "no diff"; exit 0; }
          git commit -m "ci(pages): render brutalist mono contribution graph (auto by .github/workflows/contrib.yml)"
          git push
