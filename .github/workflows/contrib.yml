name: refresh contribution data

on:
  schedule:
    # every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: fetch and patch
        uses: actions/github-script@v7
        with:
          script: |
            const query = `query($login: String!) {
              user(login: $login) {
                contributionsCollection {
                  contributionCalendar { totalContributions }
                  totalCommitContributions
                  totalPullRequestContributions
                  totalIssueContributions
                }
                pullRequests(first: 1) { totalCount }
                repositories(ownerAffiliations: OWNER) { totalCount }
              }
            }`;
            const res = await github.graphql(query, { login: 'AzureAbalone' });
            const cc = res.user.contributionsCollection;
            const fmt = (n) => String(n).toLocaleString('en-US');

            // Placeholders MUST exist in index.html, e.g. <div class="stat-num" data-stat="commits-in-july-2026">75</div>
            const fs = require('fs');
            const tpl = fs.readFileSync('index.html', 'utf8');
            const patches = {
              'last-year-contribs': fmt(cc.contributionCalendar.totalContributions),
              'commits-in-july-2026': fmt(cc.totalCommitContributions),
              'active-repositories': String(res.user.repositories.totalCount),
              'pull-requests-merged': fmt(res.user.pullRequests.totalCount),
            };

            let html = tpl;
            let changed = false;
            for (const [key, value] of Object.entries(patches)) {
              const re = new RegExp(`(<div class="stat-num" data-stat="${key}">)([\\d,]+)(</div>)`);
              const next = html.replace(re, (_m, a, _b, c) => a + value + c);
              if (next !== html) { changed = true; html = next; }
            }
            if (!changed) {
              core.notice('no stat values changed; skip commit');
              return;
            }
            fs.writeFileSync('index.html', html);

      - name: commit and push
        run: |
          git config user.name "azure-abalone-bot"
          git config user.email "azure-abalone-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && { echo "no diff"; exit 0; }
          git commit -m "ci(contrib): refresh stats via GraphQL

auto-refresh by .github/workflows/contrib.yml"
          git push
